services:
  db:
    image: pgvector/pgvector:pg17
    container_name: local-vault-vdb
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: task_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev_user -d task_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
